<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
<rect width="800" height="900" fill="#2a2720"/>
<!-- wnęka – tło -->
<rect x="80" y="60" width="640" height="800" rx="4" fill="#1e1c19"/>
<!-- lewa ściana wnęki -->
<rect x="80" y="60" width="30" height="800" fill="#3a3529"/>
<!-- prawa ściana wnęki -->
<rect x="690" y="60" width="30" height="800" fill="#3a3529"/>
<!-- sufit wnęki -->
<rect x="80" y="60" width="640" height="28" fill="#3a3529"/>
<!-- podłoga wnęki -->
<rect x="80" y="832" width="640" height="28" fill="#3a3529"/>

<!-- SZAFA — korpus -->
<!-- Bok lewy -->
<rect x="110" y="88" width="22" height="720" fill="#c4a882" stroke="#9a7a45" stroke-width="1.5"/>
<!-- Bok prawy -->
<rect x="668" y="88" width="22" height="720" fill="#c4a882" stroke="#9a7a45" stroke-width="1.5"/>
<!-- Wieniec górny -->
<rect x="110" y="88" width="580" height="22" fill="#c4a882" stroke="#9a7a45" stroke-width="1.5"/>
<!-- Wieniec dolny / podstawa -->
<rect x="110" y="786" width="580" height="22" fill="#c4a882" stroke="#9a7a45" stroke-width="1.5"/>
<!-- Cokół -->
<rect x="110" y="808" width="580" height="28" fill="#b8895a" stroke="#9a7a45" stroke-width="1"/>

<!-- SEKCJA LEWA — półki i szuflady -->
<!-- Separator sekcji 1/3 -->
<rect x="300" y="110" width="18" height="676" fill="#c4a882" stroke="#9a7a45" stroke-width="1"/>
<!-- Półki lewej sekcji -->
<rect x="132" y="210" width="150" height="14" fill="#ddd0bc" stroke="#9a7a45" stroke-width="1"/>
<rect x="132" y="310" width="150" height="14" fill="#ddd0bc" stroke="#9a7a45" stroke-width="1"/>
<rect x="132" y="410" width="150" height="14" fill="#ddd0bc" stroke="#9a7a45" stroke-width="1"/>
<rect x="132" y="510" width="150" height="14" fill="#ddd0bc" stroke="#9a7a45" stroke-width="1"/>
<!-- Szuflady lewej sekcji (dół) -->
<rect x="134" y="560" width="148" height="50" rx="2" fill="#d4b896" stroke="#9a7a45" stroke-width="1"/>
<rect x="134" y="616" width="148" height="50" rx="2" fill="#d4b896" stroke="#9a7a45" stroke-width="1"/>
<rect x="134" y="672" width="148" height="50" rx="2" fill="#d4b896" stroke="#9a7a45" stroke-width="1"/>
<rect x="134" y="728" width="148" height="50" rx="2" fill="#d4b896" stroke="#9a7a45" stroke-width="1"/>
<!-- uchwyty szuflad -->
<rect x="196" y="580" width="26" height="8" rx="4" fill="#888" stroke="#666" stroke-width="1"/>
<rect x="196" y="636" width="26" height="8" rx="4" fill="#888" stroke="#666" stroke-width="1"/>
<rect x="196" y="692" width="26" height="8" rx="4" fill="#888" stroke="#666" stroke-width="1"/>
<rect x="196" y="748" width="26" height="8" rx="4" fill="#888" stroke="#666" stroke-width="1"/>

<!-- SEKCJA ŚRODKOWA — drążki -->
<!-- Separator sekcji 2/3 -->
<rect x="492" y="110" width="18" height="676" fill="#c4a882" stroke="#9a7a45" stroke-width="1"/>
<!-- Półka górna -->
<rect x="318" y="200" width="156" height="14" fill="#ddd0bc" stroke="#9a7a45" stroke-width="1"/>
<!-- Drążek górny -->
<rect x="322" y="280" width="148" height="10" rx="5" fill="#888" stroke="#666" stroke-width="1"/>
<!-- Drążek dolny -->
<rect x="322" y="540" width="148" height="10" rx="5" fill="#888" stroke="#666" stroke-width="1"/>
<!-- Efekt ubrań na drążku górnym -->
<line x1="336" y1="290" x2="336" y2="470" stroke="#c4a882" stroke-width="2" stroke-dasharray="4,6" opacity="0.4"/>
<line x1="360" y1="290" x2="360" y2="490" stroke="#c4a882" stroke-width="2" stroke-dasharray="4,8" opacity="0.3"/>
<line x1="384" y1="290" x2="384" y2="460" stroke="#c4a882" stroke-width="2" stroke-dasharray="4,5" opacity="0.35"/>
<line x1="408" y1="290" x2="408" y2="480" stroke="#c4a882" stroke-width="2" stroke-dasharray="4,7" opacity="0.3"/>
<!-- Efekt ubrań na drążku dolnym -->
<line x1="336" y1="550" x2="336" y2="700" stroke="#c4a882" stroke-width="2" stroke-dasharray="3,5" opacity="0.35"/>
<line x1="358" y1="550" x2="358" y2="710" stroke="#c4a882" stroke-width="2" stroke-dasharray="3,6" opacity="0.3"/>
<line x1="380" y1="550" x2="380" y2="695" stroke="#c4a882" stroke-width="2" stroke-dasharray="3,5" opacity="0.3"/>
<!-- Półka w połowie -->
<rect x="318" y="510" width="156" height="14" fill="#ddd0bc" stroke="#9a7a45" stroke-width="1"/>

<!-- SEKCJA PRAWA — półki -->
<!-- Półki prawej sekcji -->
<rect x="510" y="200" width="150" height="14" fill="#ddd0bc" stroke="#9a7a45" stroke-width="1"/>
<rect x="510" y="300" width="150" height="14" fill="#ddd0bc" stroke="#9a7a45" stroke-width="1"/>
<rect x="510" y="400" width="150" height="14" fill="#ddd0bc" stroke="#9a7a45" stroke-width="1"/>
<rect x="510" y="500" width="150" height="14" fill="#ddd0bc" stroke="#9a7a45" stroke-width="1"/>
<rect x="510" y="600" width="150" height="14" fill="#ddd0bc" stroke="#9a7a45" stroke-width="1"/>
<rect x="510" y="700" width="150" height="14" fill="#ddd0bc" stroke="#9a7a45" stroke-width="1"/>

<!-- Oświetlenie LED (subtelne) -->
<rect x="110" y="88" width="580" height="6" rx="3" fill="#f5e8c0" opacity="0.4"/>
<!-- Blask LED -->
<rect x="110" y="88" width="580" height="60" fill="url(#glow)" opacity="0.15"/>
<defs>
<linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#f5e8c0" stop-opacity="0.6"/>
<stop offset="100%" stop-color="#f5e8c0" stop-opacity="0"/>
</linearGradient>
</defs>
</svg>