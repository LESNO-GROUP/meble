<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
<defs>
<linearGradient id="mirror_g" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#c8d8e8" stop-opacity="0.6"/>
<stop offset="100%" stop-color="#e8f0f8" stop-opacity="0.3"/>
</linearGradient>
<linearGradient id="tile_v" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#2a2826"/>
<stop offset="100%" stop-color="#1e1c1a"/>
</linearGradient>
</defs>
<!-- Tło pomieszczenia -->
<rect width="800" height="900" fill="#1e1c1a"/>
<!-- Podłoga -->
<rect x="0" y="800" width="800" height="100" fill="#2a2826"/>
<!-- Fugi podłogowe -->
<line x1="0" y1="850" x2="800" y2="850" stroke="#333" stroke-width="1" opacity="0.5"/>
<line x1="200" y1="800" x2="200" y2="900" stroke="#333" stroke-width="1" opacity="0.5"/>
<line x1="400" y1="800" x2="400" y2="900" stroke="#333" stroke-width="1" opacity="0.5"/>
<line x1="600" y1="800" x2="600" y2="900" stroke="#333" stroke-width="1" opacity="0.5"/>
<!-- Ściana tylna — jasne kafle -->
<rect x="60" y="60" width="680" height="740" fill="#e8e0d8"/>
<!-- Poziome fugi ściany -->
<line x1="60" y1="160" x2="740" y2="160" stroke="#ccc" stroke-width="1" opacity="0.6"/>
<line x1="60" y1="260" x2="740" y2="260" stroke="#ccc" stroke-width="1" opacity="0.6"/>
<line x1="60" y1="360" x2="740" y2="360" stroke="#ccc" stroke-width="1" opacity="0.6"/>
<line x1="60" y1="460" x2="740" y2="460" stroke="#ccc" stroke-width="1" opacity="0.6"/>
<line x1="60" y1="560" x2="740" y2="560" stroke="#ccc" stroke-width="1" opacity="0.6"/>
<line x1="60" y1="660" x2="740" y2="660" stroke="#ccc" stroke-width="1" opacity="0.6"/>
<!-- Pionowe fugi -->
<line x1="200" y1="60" x2="200" y2="800" stroke="#ccc" stroke-width="1" opacity="0.4"/>
<line x1="340" y1="60" x2="340" y2="800" stroke="#ccc" stroke-width="1" opacity="0.4"/>
<line x1="480" y1="60" x2="480" y2="800" stroke="#ccc" stroke-width="1" opacity="0.4"/>
<line x1="620" y1="60" x2="620" y2="800" stroke="#ccc" stroke-width="1" opacity="0.4"/>

<!-- SZAFKA GÓRNA — lustro z szafką -->
<rect x="90" y="90" width="440" height="300" rx="4" fill="url(#mirror_g)" stroke="#b8895a" stroke-width="2"/>
<!-- Rama lustra -->
<rect x="94" y="94" width="432" height="292" rx="2" fill="none" stroke="#e8d8c0" stroke-width="1" opacity="0.8"/>
<!-- Odbicie w lustrze -->
<rect x="98" y="98" width="424" height="284" rx="2" fill="#d8e8f0" opacity="0.25"/>
<!-- Uchwyt szafki lustrzanej -->
<line x1="310" y1="300" x2="310" y2="390" stroke="#9a7a45" stroke-width="2"/>
<!-- Szafka pod lustrem (corpus) -->
<rect x="90" y="390" width="440" height="30" rx="2" fill="#c4a882" stroke="#9a7a45" stroke-width="1.5"/>
<!-- Drzwiczki szafki (2) -->
<rect x="92" y="422" width="216" height="180" rx="2" fill="#d4b896" stroke="#9a7a45" stroke-width="1.5"/>
<rect x="312" y="422" width="216" height="180" rx="2" fill="#d4b896" stroke="#9a7a45" stroke-width="1.5"/>
<rect x="194" y="508" width="14" height="6" rx="3" fill="#888" stroke="#666"/>
<rect x="414" y="508" width="14" height="6" rx="3" fill="#888" stroke="#666"/>

<!-- SZAFKA SŁUPKOWA PRAWA -->
<rect x="560" y="90" width="160" height="20" rx="2" fill="#c4a882" stroke="#9a7a45" stroke-width="1.5"/>
<rect x="560" y="110" width="160" height="20" rx="2" fill="#c4a882" stroke="#9a7a45" stroke-width="1.5"/>
<!-- Drzwi słupka górnego -->
<rect x="562" y="130" width="156" height="200" rx="2" fill="#d4b896" stroke="#9a7a45" stroke-width="1.5"/>
<rect x="632" y="225" width="14" height="6" rx="3" fill="#888"/>
<!-- Środkowy separator -->
<rect x="560" y="330" width="160" height="12" fill="#c4a882" stroke="#9a7a45" stroke-width="1"/>
<!-- Drzwi słupka dolnego -->
<rect x="562" y="342" width="156" height="280" rx="2" fill="#d4b896" stroke="#9a7a45" stroke-width="1.5"/>
<rect x="632" y="478" width="14" height="6" rx="3" fill="#888"/>
<rect x="560" y="622" width="160" height="14" fill="#c4a882" stroke="#9a7a45" stroke-width="1.5"/>
<rect x="560" y="636" width="160" height="16" fill="#b8895a" stroke="#9a7a45" stroke-width="1"/>

<!-- SZAFKA PODUMYWALKOWA -->
<rect x="90" y="620" width="200" height="16" rx="2" fill="#c4a882" stroke="#9a7a45" stroke-width="1.5"/>
<rect x="90" y="636" width="200" height="140" rx="4" fill="#d4b896" stroke="#9a7a45" stroke-width="1.5"/>
<rect x="92" y="638" width="196" height="136" rx="2" fill="none" stroke="#e8d8c0" stroke-width="0.5" opacity="0.5"/>
<rect x="178" y="704" width="24" height="7" rx="3" fill="#888" stroke="#666"/>
<rect x="90" y="776" width="200" height="24" fill="#b8895a" stroke="#9a7a45" stroke-width="1"/>

<!-- UMYWALKA -->
<ellipse cx="190" cy="618" rx="90" ry="18" fill="#f0ece8" stroke="#ccc" stroke-width="1.5"/>
<ellipse cx="190" cy="618" rx="60" ry="12" fill="#e0dcd8" stroke="#bbb" stroke-width="1"/>
<!-- Bateria -->
<rect x="184" y="590" width="12" height="28" rx="6" fill="#aaa" stroke="#888" stroke-width="1"/>
<ellipse cx="190" cy="590" rx="14" ry="6" fill="#aaa" stroke="#888" stroke-width="1"/>

<!-- Uchwyty ręcznikowe -->
<rect x="60" y="450" width="20" height="80" rx="2" fill="#aaa" stroke="#888" stroke-width="1"/>
<rect x="62" y="454" width="16" height="72" rx="1" fill="#e8d8b0" opacity="0.6"/>

<!-- Oświetlenie — pas LED nad lustrem -->
<rect x="90" y="82" width="440" height="8" rx="4" fill="#f5f0e0" opacity="0.7"/>
<rect x="90" y="82" width="440" height="40" fill="url(#led_glow)" opacity="0.2"/>
<defs>
<linearGradient id="led_glow" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#f5f0e0"/>
<stop offset="100%" stop-color="#f5f0e0" stop-opacity="0"/>
</linearGradient>
</defs>
</svg>